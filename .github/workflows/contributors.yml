name: Contributors

# Auto-updates the "Contributors" section in README.md every time something
# lands on `main`, and once a week on Sunday as a safety net for
# `[skip ci]` merges. Powered by the BobAnkh/add-contributors action.

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  add-contributors:
    name: Refresh contributors list
    runs-on: ubuntu-latest
    if: github.repository == 'triggeryjs/triggery'
    steps:
      - uses: actions/checkout@v6
        with:
          # Need full history so contributor stats are accurate.
          fetch-depth: 0

      - name: Update README contributors block
        uses: BobAnkh/add-contributors@v0.2.2
        with:
          CONTRIBUTOR: '## Contributors'
          COLUMN_PER_ROW: 6
          IMG_WIDTH: 80
          FONT_SIZE: 14
          AVATAR_SHAPE: round
          PATH: '/README.md'
          ACCESS_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COMMIT_MESSAGE: 'docs(readme): refresh contributors'
