name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write       # create the Version Packages PR + push commits
  pull-requests: write  # create/update PRs
  id-token: write       # npm Trusted Publishers (OIDC, --provenance)

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'

      # setup-node@v6 + Node 20 ships with npm 10. npm Trusted Publishers
      # require npm 11+ for the OIDC publish flow to match the new server-
      # side validator. Without this step `changeset publish` hits the
      # registry as if from a legacy 2FA-required client, and every PUT
      # comes back as "404 not found" (npm's misleading wording for "no
      # matching trusted publisher rule for this token").
      - run: npm install -g npm@latest

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - name: Create Release PR or Publish
        uses: changesets/action@v1
        with:
          publish: pnpm release
          commit: 'chore: release packages'
          title: 'chore: release packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # No NPM_TOKEN needed — Trusted Publishers are configured for every
          # @triggery/* package on npm and `id-token: write` above lets the
          # action exchange the GitHub OIDC token for an ephemeral npm
          # publishing credential. Publish records include provenance
          # attestations automatically.
