name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write       # create the Version Packages PR + push commits
  pull-requests: write  # create/update PRs
  id-token: write       # npm Trusted Publishers (OIDC, --provenance)

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - name: Create Release PR or Publish
        uses: changesets/action@v1
        with:
          publish: pnpm release
          commit: 'chore: release packages'
          title: 'chore: release packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # NB: NPM_TOKEN is not needed when using Trusted Publishers (OIDC).
          # Uncomment if you fall back to the classic token flow:
          # NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
