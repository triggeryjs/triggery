name: Benchmark

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  bench:
    name: Bench
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build

      # Two separate CodSpeed uploads so the dashboard shows two distinct
      # benchmark suites:
      #
      # - `core` — Triggery's own dispatch hot path. Pure JS, no system calls,
      #   so we use `simulation` (Valgrind-based cycle counting) for maximum
      #   regression sensitivity.
      #
      # - `vs` — side-by-side comparisons against effector / rxjs / saga /
      #   xstate / reatom / mobx. Some of these libraries make system calls
      #   under load (RxJS schedulers via `performance.now()`, sagas via
      #   setTimeout/queueMicrotask, MobX/Reatom reactivity graphs), and
      #   CodSpeed's instrumentation mode cannot consistently account for
      #   syscalls (the "34 system calls, totalling 2.6s ignored" warning).
      #   Switching to `walltime` measures real wall-clock and gives an honest
      #   apples-to-apples comparison across libraries.
      #
      # Same CI run, two clean suites on https://codspeed.io/triggeryjs/triggery.

      - name: Bench — core (Triggery dispatch hot path)
        uses: CodSpeedHQ/action@v4
        with:
          mode: simulation
          run: cd benchmarks && pnpm exec vitest bench --run bench/core

      - name: Bench — vs (side-by-side comparisons)
        uses: CodSpeedHQ/action@v4
        with:
          mode: walltime
          run: cd benchmarks && pnpm exec vitest bench --run bench/vs
