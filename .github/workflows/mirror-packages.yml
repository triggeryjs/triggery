name: Mirror to GitHub Packages

# Mirrors every @triggery/* package onto GitHub Packages under the
# @triggeryjs/* scope so the org's /packages page
# (https://github.com/orgs/triggeryjs/packages) shows them.
#
# Why the rename:
# GitHub Packages enforces "scope name must equal owner name" for npm
# publishes — a GITHUB_TOKEN bound to the `triggeryjs` org can ONLY
# publish into the `@triggeryjs` scope. Publishing as `@triggery/core`
# returns 403 "The requested installation does not exist". So this
# workflow renames `name` from `@triggery/X` → `@triggeryjs/X` right
# before each publish (then reverts via git checkout).
#
# Result: the npm.js canonical name stays `@triggery/X`. The GH
# Packages mirror is a visibility-only decoration with the same version
# numbers, published under `@triggeryjs/X`.

on:
  workflow_dispatch:
  workflow_run:
    workflows: ['Release']
    types: [completed]
    branches: [main]

permissions:
  contents: read
  packages: write
  id-token: write

concurrency:
  group: mirror-gh-packages
  cancel-in-progress: false

jobs:
  mirror:
    name: Publish @triggeryjs/* mirror
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v6

      # registry-url + scope writes the per-scope auth block into
      # ~/.npmrc so `npm publish` of @triggeryjs/* routes to GH Packages
      # and uses NODE_AUTH_TOKEN.
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
          registry-url: 'https://npm.pkg.github.com'
          scope: '@triggeryjs'

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - name: Publish renamed packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # publishConfig.provenance is for npm.js Trusted Publishers
          # OIDC; GH Packages rejects external Sigstore attestations.
          NPM_CONFIG_PROVENANCE: 'false'
        run: |
          set +e
          published=0
          skipped=0
          for pkg_dir in packages/*/; do
            pkg_dir="${pkg_dir%/}"
            pkg_json="$pkg_dir/package.json"
            [ -f "$pkg_json" ] || continue

            pkg_name=$(node -p "require('./$pkg_json').name")
            pkg_version=$(node -p "require('./$pkg_json').version")
            is_private=$(node -p "require('./$pkg_json').private === true")

            if [ "$is_private" = "true" ] || [ "$pkg_name" = "null" ] || [ "$pkg_name" = "undefined" ]; then
              skipped=$((skipped+1))
              continue
            fi

            gh_name=${pkg_name/@triggery\//@triggeryjs/}
            echo ""
            echo "→ publish $gh_name@$pkg_version (from $pkg_name)"

            # Rewrite ONLY the `name` field in-place. Internal
            # @triggery/* imports stay; consumers who pull from GH
            # Packages will fetch @triggery/* deps from npm.js
            # transparently via default registry.
            node -e "
              const fs = require('fs');
              const p = './$pkg_json';
              const pkg = JSON.parse(fs.readFileSync(p, 'utf8'));
              pkg.name = pkg.name.replace('@triggery/', '@triggeryjs/');
              fs.writeFileSync(p, JSON.stringify(pkg, null, 2) + '\n');
            "

            (
              cd "$pkg_dir"
              npm publish \
                --registry=https://npm.pkg.github.com \
                --access=public \
                --no-git-checks
            )
            rc=$?

            # Always restore the on-disk package.json so the next loop
            # iteration / a future workflow re-run starts clean.
            git checkout -- "$pkg_json"

            if [ $rc -eq 0 ]; then
              published=$((published+1))
            else
              echo "  ⚠ exit=$rc (likely already published or auth error)"
              skipped=$((skipped+1))
            fi
          done

          echo ""
          echo "=== summary: published=$published, skipped=$skipped ==="
          exit 0
