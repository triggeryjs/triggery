version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      dev-dependencies:
        dependency-type: development
    ignore:
      # tinybench v6 is not yet supported by @codspeed/vitest-plugin
      # tracking: https://github.com/CodSpeedHQ/codspeed-node/issues/69
      - dependency-name: tinybench
        update-types: [version-update:semver-major]
