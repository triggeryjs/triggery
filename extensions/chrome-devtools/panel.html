<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Triggery DevTools</title>
    <style>
      :root {
        color-scheme: light dark;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: #fff;
        color: #24292e;
        font-family:
          system-ui,
          -apple-system,
          'Segoe UI',
          sans-serif;
        font-size: 13px;
      }
      header {
        padding: 8px 12px;
        background: #f6f8fa;
        border-bottom: 1px solid #d0d7de;
        display: flex;
        gap: 12px;
        align-items: baseline;
      }
      header h1 {
        margin: 0;
        font-size: 14px;
      }
      header .meta {
        color: #586069;
        font-size: 12px;
        margin-left: auto;
        display: flex;
        gap: 12px;
        align-items: center;
      }
      header button {
        background: transparent;
        border: 1px solid #d0d7de;
        border-radius: 4px;
        padding: 2px 8px;
        cursor: pointer;
        font-size: 12px;
      }
      header button:hover {
        background: #fff;
      }
      .status {
        display: inline-block;
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #d0d7de;
      }
      .status.connected {
        background: #1a7f37;
      }
      .empty {
        padding: 24px;
        text-align: center;
        color: #586069;
      }
      ul.runs {
        list-style: none;
        margin: 0;
        padding: 0;
      }
      ul.runs li {
        border-bottom: 1px solid #eee;
      }
      .row {
        display: grid;
        grid-template-columns: 70px 60px 1fr auto auto;
        gap: 8px;
        align-items: baseline;
        padding: 6px 12px;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 12px;
        cursor: pointer;
      }
      .row:hover {
        background: #f6f8fa;
      }
      .row .status-tag {
        font-weight: 600;
        text-transform: uppercase;
      }
      .status-tag.fired {
        color: #1a7f37;
      }
      .status-tag.skipped {
        color: #846008;
      }
      .status-tag.errored {
        color: #a01a1a;
      }
      .status-tag.aborted {
        color: #586069;
      }
      .row .duration {
        color: #586069;
      }
      .row .trigger {
        font-weight: 600;
      }
      .row .event {
        color: #586069;
      }
      .row .actions {
        color: #0969da;
      }
      .row .reason {
        font-style: italic;
        color: #846008;
      }
      details {
        background: #fafbfc;
        padding: 8px 12px 12px;
      }
      details pre {
        margin: 6px 0 0;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 11px;
        background: #f6f8fa;
        border: 1px solid #eaecef;
        padding: 8px;
        border-radius: 4px;
        overflow: auto;
        max-height: 320px;
      }
      @media (prefers-color-scheme: dark) {
        html,
        body {
          background: #0d1117;
          color: #c9d1d9;
        }
        header {
          background: #161b22;
          border-bottom-color: #30363d;
        }
        header button {
          border-color: #30363d;
          color: inherit;
        }
        header button:hover {
          background: #21262d;
        }
        .row:hover {
          background: #161b22;
        }
        ul.runs li {
          border-bottom-color: #21262d;
        }
        details {
          background: #161b22;
        }
        details pre {
          background: #0d1117;
          border-color: #30363d;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Triggery</h1>
      <div class="meta">
        <span><span class="status" id="status-dot"></span> <span id="status-label">waiting…</span></span>
        <span id="counter">0 runs</span>
        <span id="runtime-id" style="color: #586069"></span>
        <button type="button" id="clear">Clear</button>
      </div>
    </header>
    <main id="root">
      <div class="empty">
        Waiting for the page to call <code>installDevtoolsBridge(runtime)</code>…
      </div>
    </main>
    <script src="panel.js"></script>
  </body>
</html>
